services:
  transcribebot:
    image: ${API_IMAGE_NAME}:${API_IMAGE_TAG}
    build:
      context: .
      dockerfile: TranscribeBot/Dockerfile
    environment:
      - Telegram__Token=${TELEGRAM_TOKEN}
      - OpenRouter__ApiKey=${OPENROUTER_API_KEY}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transcribe-network

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - postgres_179:/var/lib/postgresql/data
    networks:
      - transcribe-network

networks:
  transcribe-network:

volumes:
  postgres_179: